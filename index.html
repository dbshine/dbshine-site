<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- SEO -->
    <title>Bienvenue | Espace personnel</title>
    <meta name="description" content="Espace personnel. Ouvert aux échanges pertinents et opportunités.">
    <meta name="robots" content="index, follow">

    <!-- Open Graph -->
    <meta property="og:title" content="Bienvenue">
    <meta property="og:description" content="Espace personnel - Contactez-moi si nécessaire.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="MainIMG_fr.png">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: no-repeat center center fixed;
            background-size: cover;
            position: relative;
            transition: background-image 0.4s ease-in-out;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.10);
        }

        .glass-card {
            position: absolute;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;

            padding: 14px 28px;
            border-radius: 14px;

            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);

            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            text-align: center;
        }

        .glass-card p {
            margin: 0;
            font-size: 0.95rem;
            color: #444;
        }

        .glass-card a {
            color: #2c7a7b;
            text-decoration: none;
            font-weight: 500;
        }

        .glass-card a:hover {
            text-decoration: underline;
        }

        .footer {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
            color: #555;
            z-index: 2;
        }

        /* Switch langue */
        .lang-switch {
            position: absolute;
            top: 15px;
            right: 20px;
            z-index: 3;
            font-size: 0.85rem;
        }

        .lang-switch a {
            color: #444;
            text-decoration: none;
            margin: 0 5px;
            font-weight: 500;
        }

        .lang-switch a.active {
            text-decoration: underline;
        }

        .fade-in {
            animation: fadeIn 1.2s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, 10px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        @media (max-width: 768px) {
            .glass-card {
                width: 90%;
                bottom: 90px;
            }
        }
    </style>
</head>

<body>

<div class="overlay"></div>

<!-- Switch langue -->
<div class="lang-switch">
    <a href="#" id="fr-btn">FR</a> |
    <a href="#" id="en-btn">EN</a>
</div>

<!-- Carte -->
<div class="glass-card fade-in">
    <p id="cta-text"></p>
</div>

<!-- Footer -->
<div class="footer">
    © 2026 — <span id="footer-text"></span>
</div>

<script>
    function getLang() {
        const params = new URLSearchParams(window.location.search);
        const forced = params.get("lang");

        if (forced === "fr" || forced === "en") return forced;

        const browser = navigator.language || navigator.userLanguage;
        return browser.startsWith("fr") ? "fr" : "en";
    }

    function setLang(lang) {
        const email = "contact@dbshine.com";

        const content = {
            fr: {
                cta: `Ouvert aux échanges pertinents — <a href="mailto:${email}">${email}</a>`,
                footer: "Espace personnel",
                bg: "MainIMG_fr.png"
            },
            en: {
                cta: `Open to meaningful conversations — <a href="mailto:${email}">${email}</a>`,
                footer: "Personal space",
                bg: "MainIMG_en.png"
            }
        };

        document.getElementById("cta-text").innerHTML = content[lang].cta;
        document.getElementById("footer-text").innerText = content[lang].footer;

        document.body.style.backgroundImage = `url('${content[lang].bg}')`;

        document.documentElement.lang = lang;

        // Update boutons
        document.getElementById("fr-btn").classList.toggle("active", lang === "fr");
        document.getElementById("en-btn").classList.toggle("active", lang === "en");

        // URL propre
        const newUrl = window.location.pathname + "?lang=" + lang;
        window.history.replaceState(null, "", newUrl);
    }

    const currentLang = getLang();
    setLang(currentLang);

    document.getElementById("fr-btn").onclick = () => setLang("fr");
    document.getElementById("en-btn").onclick = () => setLang("en");
</script>

</body>
</html>
